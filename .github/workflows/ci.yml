name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint (PHP 8.4)

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Validate composer.json
        run: composer validate --strict

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

      - name: Run Pint
        run: vendor/bin/pint --test

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            laravel: '12.*'
            testbench: '10.*'
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
          - php: '8.3'
            laravel: '13.*'
            testbench: '11.*'
          - php: '8.4'
            laravel: '13.*'
            testbench: '11.*'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: redis
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-update
          composer install --no-progress --prefer-dist

      - name: Run tests
        run: vendor/bin/pest

  redis-integration:
    runs-on: ubuntu-latest
    name: Redis Integration (Redis 7 + PHP 8.4)

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: redis
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run tests with Redis
        run: vendor/bin/pest
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

  redis6-integration:
    runs-on: ubuntu-latest
    name: Redis Integration (Redis 6 + PHP 8.3)

    services:
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: redis
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run tests with Redis
        run: vendor/bin/pest
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

  coverage:
    runs-on: ubuntu-latest
    name: Coverage

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: redis
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run tests with coverage
        run: vendor/bin/pest --coverage --min=80 --coverage-clover=build/logs/clover.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/logs/clover.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
