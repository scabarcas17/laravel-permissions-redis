name: Bug Report
description: Report a bug in laravel-permissions-redis
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below.

  - type: input
    id: package-version
    attributes:
      label: Package Version
      placeholder: "2.0.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "8.3.12"
    validations:
      required: true

  - type: input
    id: laravel-version
    attributes:
      label: Laravel Version
      placeholder: "12.0"
    validations:
      required: true

  - type: dropdown
    id: redis-extension
    attributes:
      label: Redis Extension
      options:
        - phpredis
        - predis
    validations:
      required: true

  - type: input
    id: redis-version
    attributes:
      label: Redis Server Version
      placeholder: "7.2"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or stack traces if applicable.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information (config, logs, screenshots).
    validations:
      required: false
